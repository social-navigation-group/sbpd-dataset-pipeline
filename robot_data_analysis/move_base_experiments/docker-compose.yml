version: '3.8'

services:
  move_base_experiments:
    build: .
    #container_name: move_base_experiments
    volumes:
      # Mount rosbag directory (update this path to where your rosbags are stored)
      - /media/dataset_access/cmu_test_move_base/ros2:/ros2_bags:ro
      # This experiment generates ros1 bags which need to be saved as well.
      - /media/dataset_access/cmu_test_move_base/ros1:/ros1_bags
      # Mount output directory for results
      - /media/dataset_access/cmu_test_move_base/processed:/output      
      # Mount the current directory to sync with container
      - .:/catkin_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_MASTER_URI=http://localhost:11311
      - ROS_IP=127.0.0.1
      - QT_X11_NO_MITSHM=1
    network_mode: host
    stdin_open: true
    tty: true
    # Uncomment if you need GUI support (for rviz, etc.)
      
    